<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playground</title>
  <style>
    :root {
      --bg: #111111;
      --card-bg: #1a1a1a;
      --card-border: #2a2a2a;
      --text: #e8e4e0;
      --text-dim: #666;
      --accent: #555;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4rem 1.25rem;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.04em;
    }

    header h1 span { color: var(--text-dim); font-weight: 400; }

    header p {
      margin-top: 0.4rem;
      color: var(--text-dim);
      font-size: 0.9rem;
    }

    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1rem;
      width: 100%;
      max-width: 640px;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 1.5rem;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      transition: border-color 0.15s, background 0.15s;
    }

    .card:hover {
      background: #222;
      border-color: #444;
    }

    .card-icon { font-size: 2rem; line-height: 1; }

    .card-name {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .card-desc {
      font-size: 0.875rem;
      color: var(--text-dim);
      line-height: 1.45;
    }

    .card-arrow {
      margin-top: auto;
      padding-top: 0.75rem;
      font-size: 0.8rem;
      color: var(--accent);
    }

    footer {
      margin-top: auto;
      padding-top: 4rem;
      font-size: 0.8rem;
      color: var(--text-dim);
    }
  </style>
</head>
<body>
  <header>
    <h1>Wolfgang's <span>Playground</span></h1>
    <p>A collection of things.</p>
  </header>

  <div class="projects">
    <a class="card" href="meowdoku/">
      <div class="card-icon">🐱</div>
      <div class="card-name">Meowdoku Solver</div>
      <div class="card-desc">Solve LinkedIn Queens and Meowdoku puzzles step by step, with hints and explanations.</div>
      <div class="card-arrow">Open →</div>
    </a>
    <a class="card" href="zlatan/">
      <div class="card-icon">⚽</div>
      <div class="card-name">Zlatan</div>
      <div class="card-desc">Quotes and facts from the greatest of all time.</div>
      <div class="card-arrow">Open →</div>
    </a>
  </div>

  <footer>woleywa.github.io/claude-playground</footer>
</body>
</html>
